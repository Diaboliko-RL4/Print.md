<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCustomStore</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* HEADER */
header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
}

/* HERO */
.hero {
    background: url('https://picsum.photos/1200/400') no-repeat center;
    background-size: cover;
    color: white;
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 40px;
}

/* PRODOTTI */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    border: 1px solid #ddd;
    padding: 10px;
    text-align: center;
}

.card img {
    width: 100%;
}

button {
    padding: 10px;
    background: #0078d7;
    color: white;
    border: none;
    cursor: pointer;
}

/* CONFIGURATOR */
.config {
    padding: 20px;
    background: #f5f5f5;
}

</style>

</head>

<body>

<header>
    <h2>My Custom Store</h2>
</header>

<div class="hero">
    <h1>Crea la tua maglietta</h1>
    <p>Design unico in pochi click</p>
</div>

<section class="products">

<div class="card">
    <img src="https://picsum.photos/300/200?1">
    <h3>T-Shirt Basic</h3>
    <p>€20</p>
    <button onclick="selectProduct('T-Shirt')">Personalizza</button>
</div>

<div class="card">
    <img src="https://picsum.photos/300/200?2">
    <h3>Felpa</h3>
    <p>€40</p>
    <button onclick="selectProduct('Felpa')">Personalizza</button>
</div>

</section>

<div class="config">
    <h2>Configuratore</h2>

    <p>Prodotto scelto: <span id="product">Nessuno</span></p>

    <input type="text" id="textInput" placeholder="Scrivi testo">
    <br><br>

    <select id="color">
        <option>Bianco</option>
        <option>Nero</option>
        <option>Rosso</option>
    </select>

    <br><br>

    <button onclick="order()">Ordina</button>
</div>

<script>
function selectProduct(name) {
    document.getElementById("product").innerText = name;
}

function order() {
    let product = document.getElementById("product").innerText;
    let text = document.getElementById("textInput").value;
    let color = document.getElementById("color").value;

    alert("Ordine:\n" + product + "\nTesto: " + text + "\nColore: " + color);
}
</script>

</body>
</html>
